spring.application.name=project

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/secdev_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.servlet.multipart.file-size-threshold=2KB

# File Storage Path
file.upload-dir=src/main/resources/static/uploads/

# Security Properties Configuration
security.bruteforce.max-email-attempts=3
security.bruteforce.max-ip-attempts=20
security.bruteforce.window-minutes=10
security.bruteforce.lock-minutes=30

spring.main.allow-circular-references=true

# Session Timeout (15 minutes)
server.servlet.session.timeout=15m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true

security.admin.password=HatdogBallsack2026!

# HTTPS (self-signed certificate for local/dev)
server.port=${SERVER_PORT:8443}
server.ssl.enabled=true
server.ssl.key-store=${SSL_KEY_STORE:classpath:certs/local-dev-keystore.p12}
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=${SSL_KEY_ALIAS:secdev-local}
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:changeit}