<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
    <!-- Edit Modal -->
    <div th:fragment="editAssetModal" id="editModal" class="fixed inset-0 bg-slate-900 bg-opacity-50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full p-8 border border-slate-200">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">Edit Asset</h2>
            <form id="editAssetForm" method="post" class="space-y-4">
                <input type="hidden" id="editId">

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Asset Name</label>
                    <input type="text" id="editName" name="name" required class="w-full px-4 py-2 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Value</label>
                        <input type="number" step="0.01" id="editValue" name="value" required class="w-full px-4 py-2 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Quantity</label>
                        <input type="number" id="editQty" name="quantity" required class="w-full px-4 py-2 rounded-lg border border-slate-300 outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div class="flex space-x-3 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 bg-slate-200 text-slate-700 font-bold py-2 rounded-lg hover:bg-slate-300 transition">Cancel</button>
                    <button type="submit" class="flex-1 bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition">Update Asset</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
