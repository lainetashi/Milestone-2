<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin - View Logs</title>
    <link th:href="@{/css/output.css}" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Navigation Bar -->
    <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center shadow-sm">
        <h1 class="text-2xl font-extrabold text-blue-600">Asset Tracker - Admin</h1>
        <div class="flex items-center space-x-6">
            <a href="/dashboard" class="text-slate-600 hover:text-blue-600">Dashboard</a>
            <a href="/admin/users" class="text-slate-600 hover:text-blue-600">Users</a>
            <a href="/admin/login-attempts" class="text-slate-600 hover:text-blue-600">Login Attempts</a>
            <a href="/admin/logs" class="text-blue-600 font-bold">Logs</a>
            <a href="/admin/assets" class="text-slate-600 hover:text-blue-600">Assets</a>
            <form th:action="@{/logout}" method="post" class="inline">
                <button type="submit" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-700 transition">Logout</button>
            </form>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto mt-10 p-4">
        
        <div class="bg-white p-8 rounded-xl shadow-lg border border-slate-200">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-slate-800">Application Logs</h2>
                <span class="text-sm text-slate-500">Showing last 200 lines</span>
            </div>
            
            <div class="bg-slate-900 rounded-lg p-4 overflow-x-auto max-h-[600px] overflow-y-auto">
                <pre class="text-xs text-green-400 font-mono whitespace-pre-wrap"><code th:each="line : ${logs}" th:text="${line + '&#10;'}"></code></pre>
            </div>
            
            <div class="mt-4 text-sm text-slate-500">
                <p>Log file location: <code class="bg-slate-100 px-2 py-1 rounded">logs/app.log</code></p>
            </div>
        </div>
    </main>

</body>
</html>
