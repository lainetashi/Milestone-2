<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Admin - Manage Users</title>
    <link th:href="@{/css/output.css}" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- Navigation Bar -->
    <nav class="bg-white border-b border-slate-200 px-8 py-4 flex justify-between items-center shadow-sm">
        <h1 class="text-2xl font-extrabold text-blue-600">Asset Tracker - Admin</h1>
        <div class="flex items-center space-x-6">
            <a href="/dashboard" class="text-slate-600 hover:text-blue-600">Dashboard</a>
            <a href="/admin/users" class="text-blue-600 font-bold">Users</a>
            <a href="/admin/login-attempts" class="text-slate-600 hover:text-blue-600">Login Attempts</a>
            <a href="/admin/logs" class="text-slate-600 hover:text-blue-600">Logs</a>
            <a href="/admin/assets" class="text-slate-600 hover:text-blue-600">Assets</a>
            <form th:action="@{/logout}" method="post" class="inline">
                <button type="submit" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-slate-700 transition">Logout</button>
            </form>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-10 p-4">
        
        <!-- Flash Messages -->
        <div th:if="${success}" class="mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg">
            <span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg">
            <span th:text="${error}"></span>
        </div>

        <div class="bg-white p-8 rounded-xl shadow-lg border border-slate-200">
            <h2 class="text-xl font-bold mb-6 text-slate-800">User Management</h2>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-100">
                        <tr>
                            <th class="px-4 py-3 text-sm font-bold text-slate-700">ID</th>
                            <th class="px-4 py-3 text-sm font-bold text-slate-700">Name</th>
                            <th class="px-4 py-3 text-sm font-bold text-slate-700">Email</th>
                            <th class="px-4 py-3 text-sm font-bold text-slate-700">Role</th>
                            <th class="px-4 py-3 text-sm font-bold text-slate-700">Status</th>
                            <th class="px-4 py-3 text-sm font-bold text-slate-700">Locked</th>
                            <th class="px-4 py-3 text-sm font-bold text-slate-700">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}" class="border-b border-slate-200 hover:bg-slate-50">
                            <td class="px-4 py-3 text-sm text-slate-600" th:text="${user.id}"></td>
                            <td class="px-4 py-3 text-sm text-slate-800 font-medium" th:text="${user.fullName}"></td>
                            <td class="px-4 py-3 text-sm text-slate-600" th:text="${user.email}"></td>
                            <td class="px-4 py-3">
                                <span th:if="${user.role.name() == 'ADMIN'}" class="px-2 py-1 bg-purple-100 text-purple-700 text-xs font-bold rounded">ADMIN</span>
                                <span th:if="${user.role.name() == 'USER'}" class="px-2 py-1 bg-blue-100 text-blue-700 text-xs font-bold rounded">USER</span>
                            </td>
                            <td class="px-4 py-3">
                                <span th:if="${user.enabled}" class="px-2 py-1 bg-green-100 text-green-700 text-xs font-bold rounded">Enabled</span>
                                <span th:unless="${user.enabled}" class="px-2 py-1 bg-red-100 text-red-700 text-xs font-bold rounded">Disabled</span>
                            </td>
                            <td class="px-4 py-3">
                                <span th:if="${user.accountNonLocked}" class="px-2 py-1 bg-green-100 text-green-700 text-xs font-bold rounded">Unlocked</span>
                                <span th:unless="${user.accountNonLocked}" class="px-2 py-1 bg-yellow-100 text-yellow-700 text-xs font-bold rounded">Locked</span>
                            </td>
                            <td class="px-4 py-3 space-x-1">
                                <!-- Unlock Action -->
                                <form th:unless="${user.accountNonLocked}" th:action="@{/admin/users/{id}/unlock(id=${user.id})}" method="post" class="inline">
                                    <button type="submit" class="px-2 py-1 bg-yellow-500 text-white text-xs font-bold rounded hover:bg-yellow-600">Unlock</button>
                                </form>
                                
                                <!-- Toggle Enable/Disable -->
                                <form th:action="@{/admin/users/{id}/toggle-status(id=${user.id})}" method="post" class="inline">
                                    <button type="submit" th:text="${user.enabled} ? 'Disable' : 'Enable'" 
                                            th:class="${user.enabled} ? 'px-2 py-1 bg-orange-500 text-white text-xs font-bold rounded hover:bg-orange-600' : 'px-2 py-1 bg-green-500 text-white text-xs font-bold rounded hover:bg-green-600'"></button>
                                </form>
                                
                                <!-- Change Role -->
                                <form th:action="@{/admin/users/{id}/change-role(id=${user.id})}" method="post" class="inline">
                                    <input type="hidden" name="role" th:value="${user.role.name() == 'ADMIN'} ? 'USER' : 'ADMIN'">
                                    <button type="submit" th:text="${user.role.name() == 'ADMIN'} ? 'Demote' : 'Promote'" 
                                            class="px-2 py-1 bg-indigo-500 text-white text-xs font-bold rounded hover:bg-indigo-600"></button>
                                </form>
                                
                                <!-- View Login Attempts -->
                                <a th:href="@{/admin/users/{id}/login-attempts(id=${user.id})}" 
                                   class="px-2 py-1 bg-slate-500 text-white text-xs font-bold rounded hover:bg-slate-600 inline-block">Attempts</a>
                                
                                <!-- Delete -->
                                <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" class="inline"
                                      onsubmit="return confirm('Are you sure you want to delete this user?');">
                                    <button type="submit" class="px-2 py-1 bg-red-500 text-white text-xs font-bold rounded hover:bg-red-600">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

</body>
</html>
