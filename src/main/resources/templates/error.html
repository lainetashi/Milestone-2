<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error</title>
    <link th:href="@{/css/output.css}" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-3xl w-full bg-white rounded-2xl shadow-xl border p-8">
        <h1 class="text-2xl font-bold text-slate-900 mb-4">Something went wrong</h1>

        <div class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm">
            <p th:text="${error}">An unexpected error occurred. Please try again.</p>
        </div>

        <div th:if="${debugEnabled and (stackTrace != null or trace != null)}" class="mt-6">
            <h2 class="text-lg font-semibold text-slate-800 mb-2">Debug Stack Trace</h2>
            <pre class="bg-slate-900 text-slate-100 text-white text-xs rounded-lg p-4 overflow-x-auto" th:text="${stackTrace != null ? stackTrace : trace}"></pre>
        </div>

        <div class="mt-8">
            <a th:href="@{/dashboard}" class="inline-block bg-slate-900 text-white font-bold py-2 px-4 rounded-lg hover:bg-black">
                Back to Dashboard
            </a>
        </div>
    </div>
</body>
</html>
